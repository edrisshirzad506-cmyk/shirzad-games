<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHIRZAD GAMES - Private Access</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a, #1a1a2e, #16213e);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .login-container {
            background: rgba(0,0,0,0.8);
            border: 2px solid gold;
            border-radius: 20px;
            padding: 50px 40px;
            text-align: center;
            max-width: 450px;
            width: 90%;
            box-shadow: 0 0 50px rgba(255,215,0,0.2);
        }
        
        .logo {
            font-size: 48px;
            font-weight: bold;
            color: gold;
            text-shadow: 0 0 20px rgba(255,215,0,0.5);
            letter-spacing: 5px;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #ccc;
            font-size: 16px;
            margin-bottom: 30px;
        }
        
        .lock-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }
        
        input[type="password"] {
            width: 100%;
            padding: 15px 20px;
            font-size: 18px;
            border: 2px solid rgba(255,215,0,0.3);
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            color: white;
            outline: none;
            transition: all 0.3s;
            text-align: center;
            letter-spacing: 5px;
        }
        
        input[type="password"]:focus {
            border-color: gold;
            box-shadow: 0 0 20px rgba(255,215,0,0.3);
        }
        
        .btn {
            display: inline-block;
            padding: 14px 40px;
            background: gold;
            color: black;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
            width: 100%;
        }
        
        .btn:hover {
            background: #ffd700;
            box-shadow: 0 0 30px rgba(255,215,0,0.5);
            transform: scale(1.02);
        }
        
        .error-msg {
            color: #ff4444;
            margin-top: 15px;
            display: none;
            font-size: 14px;
        }
        
        .hint {
            color: #666;
            font-size: 12px;
            margin-top: 20px;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        .shake {
            animation: shake 0.5s ease-in-out;
        }
    </style>
</head>
<body>

    <div class="login-container" id="loginBox">
        <div class="lock-icon">🔒</div>
        <div class="logo">SHIRZAD</div>
        <div class="subtitle">GAME STUDIO - PRIVATE ACCESS</div>
        
        <input type="password" id="password" placeholder="Enter Password" maxlength="20">
        <button class="btn" onclick="checkPassword()">🔑 Enter</button>
        
        <p class="error-msg" id="errorMsg">❌ Wrong password! Try again.</p>
        <p class="hint">This area is private. Only authorized users can access.</p>
    </div>

    <script>
        // ==========================================
        // CHANGE THIS PASSWORD TO YOUR OWN!
        // ==========================================
        const CORRECT_PASSWORD = "shirzad2026";
        
        function checkPassword() {
            const passwordInput = document.getElementById("password");
            const errorMsg = document.getElementById("errorMsg");
            const loginBox = document.getElementById("loginBox");
            
            const enteredPassword = passwordInput.value.trim();
            
            if (enteredPassword === CORRECT_PASSWORD) {
                // Password correct - save to session and redirect
                sessionStorage.setItem("shirzad_auth", "true");
                window.location.href = "dashboard.html";
            } else {
                // Wrong password
                errorMsg.style.display = "block";
                loginBox.classList.add("shake");
                
                setTimeout(() => {
                    loginBox.classList.remove("shake");
                }, 500);
                
                passwordInput.value = "";
                passwordInput.focus();
            }
        }
        
        // Allow Enter key to submit
        document.getElementById("password").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                checkPassword();
            }
        });
        
        // Focus on password field
        document.getElementById("password").focus();
    </script>

</body>
</html>
